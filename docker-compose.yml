services:
  postgres:
    image: postgres:16-alpine
    container_name: casper-postgres
    environment:
      POSTGRES_USER: casper
      POSTGRES_PASSWORD: casper
      POSTGRES_DB: casper
    ports:
      - "5432:5432"
    volumes:
      - casper_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U casper -d casper"]
      interval: 2s
      timeout: 3s
      retries: 10

volumes:
  casper_pg_data:
